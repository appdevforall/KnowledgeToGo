# K2Go docs (tier-3 help) — static HTML served directly by nginx.
# Placeholder path: align with the rootfs web root where static/k2go-docs is deployed.
#
# Hidden-until-content: while the folder has no index.html, an empty directory
# yields 403, remapped here to 404. The portal index (static/site/js/app.js) shows
# a module only when the probe is NOT 404, so "K2Go docs" stays hidden until real
# documentation (with an index.html) is dropped in.
location ^~ /k2go-docs/ {
    alias /library/www/html/k2go-docs/;
    autoindex off;
    index index.html;
    error_page 403 = @k2go_docs_empty;

    # ADFA-4711 — content type per file so docs behave right in the portal WebView:
    #  - Known extensions keep their nginx mime.types mapping:
    #      .html -> text/html, .txt -> text/plain (render inline);
    #      .pdf  -> application/pdf (the app routes it to the in-view pdf.js viewer, ADFA-4708);
    #      .zip/.tar/.gz -> their archive type, which the WebView cannot display inline, so it
    #                        hands them to the download handler (ADFA-4710).
    #  - Unknown extensions (.md, .patch, .diff, .log, extensionless, ...) fall back to
    #    text/plain instead of application/octet-stream, so patches / markdown / notes are
    #    READ inside the WebView as text rather than triggering a download.
    default_type text/plain;
    charset utf-8;
}
location @k2go_docs_empty { return 404; }
