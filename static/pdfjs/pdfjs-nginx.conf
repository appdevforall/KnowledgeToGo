# Mozilla pdf.js viewer (ADFA-4708) — static assets served directly by nginx on :8085.
# Enables viewing PDFs INSIDE the portal WebView (which has no built-in PDF viewer):
# the app routes a PDF to http://localhost:8085/pdfjs/web/viewer.html?file=<pdf url>.
# Same origin as the box's own PDFs, so it works fully offline (no CORS / mixed-content).
#
# Unlike k2go-docs this is infrastructure that is ALWAYS present (not hidden-until-content):
# the viewer must resolve for the feature to work. The dist ships web/ and build/ at the root.
location ^~ /pdfjs/ {
    alias /library/www/html/pdfjs/;
    autoindex off;
    index web/viewer.html;
}
