# Mozilla pdf.js viewers (ADFA-4708) — static assets served on :8085.
# Enables viewing PDFs INSIDE the portal WebView (which has no built-in PDF viewer).
# Multiple pinned builds live under /pdfjs/<id>/ (e.g. /pdfjs/6/, /pdfjs/4/); the app reads
# /pdfjs/manifest.json and routes a PDF to the best build for the device's WebView version:
#   http://localhost:8085/pdfjs/<id>/web/viewer.html?file=<pdf url>
# Same origin as the box's PDFs, so it works fully offline (no CORS / mixed-content).
# Always present (not hidden-until-content): the viewer must resolve for the feature to work.
location ^~ /pdfjs/ {
    alias /library/www/html/pdfjs/;
    autoindex off;
}
